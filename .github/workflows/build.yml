name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Generate Gradle Wrapper & Build Files
        run: |
          # Generate gradle-wrapper.properties
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # Generate minimal gradlew script (Unix)
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          exec java -jar "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"
          GRADLEW
          chmod +x gradlew
          # Generate settings.gradle with pluginManagement for Google repo
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DigitalAttendance"
          EOF

          # Generate gradle.properties
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.configuration-cache=true
          EOF

          # Generate minimal res/ structure
          mkdir -p res/values
          cat > res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Attendance</string>
          </resources>
          EOF

          # Generate build.gradle with compatible AGP 8.1.4
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.4'
          }

          android {
              namespace 'com.attendance.digital'
              compileSdk 34

              defaultConfig {
                  applicationId "com.attendance.digital"
                  minSdk 24
                  targetSdk 34                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              sourceSets {
                  main {
                      manifest.srcFile 'AndroidManifest.xml'
                      java.srcDirs = ['.']
                      assets.srcDirs = ['.']
                      res.srcDirs = ['res']
                  }
              }

              lint {
                  abortOnError false
                  checkReleaseBuilds false
              }
          }

          repositories {
              google()
              mavenCentral()
          }
          EOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: attendance-debug-apk
          path: build/outputs/apk/debug/app-debug.apk
          retention-days: 7