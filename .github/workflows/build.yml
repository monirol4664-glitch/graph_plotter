name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null

      - name: Generate Project & Gradle Wrapper
        run: |
          # 1. Create minimal required directories & files
          mkdir -p res/values
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><string name="app_name">Attendance</string></resources>' > res/values/strings.xml

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DigitalAttendance"
          EOF

          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.1.4' }
          android {
              namespace 'com.attendance.digital'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.attendance.digital"
                  minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" 
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              sourceSets { 
                  main { 
                      manifest.srcFile 'AndroidManifest.xml'
                      java.srcDirs = ['.']; assets.srcDirs = ['.']; res.srcDirs = ['res'] 
                  } 
              }
              lint { abortOnError false; checkReleaseBuilds false }
          }
          repositories { google(); mavenCentral() }
          EOF

          # 2. Generate official Gradle Wrapper (uses pre-installed Gradle on ubuntu-latest)
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: attendance-debug-apk
          path: build/outputs/apk/debug/app-debug.apk
          retention-days: 7