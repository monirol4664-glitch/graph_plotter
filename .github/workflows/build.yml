name: Android Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses & Install SDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Project Structure
        run: |
          mkdir -p src/main/java/com/attendance/digital
          mkdir -p src/main/assets
          mkdir -p src/main/res/values

          cp AndroidManifest.xml src/main/AndroidManifest.xml
          cp MainActivity.java src/main/java/com/attendance/digital/
          cp index.html src/main/assets/

          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Attendance</string></resources>' > src/main/res/values/strings.xml

          echo 'android.useAndroidX=true' > gradle.properties
          echo 'android.nonTransitiveRClass=true' >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8' >> gradle.properties

          printf 'pluginManagement {\n    repositories { google(); mavenCentral(); gradlePluginPortal() }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories { google(); mavenCentral() }\n}\nrootProject.name = "DigitalAttendance"\n' > settings.gradle

          printf "plugins {\n    id 'com.android.application' version '8.1.4'\n}\n\nandroid {\n    namespace 'com.attendance.digital'\n    compileSdk 34\n\n    defaultConfig {\n        applicationId \"com.attendance.digital\"\n        minSdk 24\n        targetSdk 34\n        versionCode 1\n        versionName \"1.0\"\n    }\n\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }\n}\n" > build.gradle

          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find & Verify APK
        run: |
          echo "🔍 Locating APK..."
          # 🔑 FIX: Use wildcard to match AGP 8.x naming (e.g., DigitalAttendance-debug.apk)
          APK_PATH=$(find . -path "*/build/outputs/apk/debug/*.apk" -type f | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found at expected path. Searching all locations:"
            find . -name "*.apk" -type f || echo "No APK files exist!"
            exit 1
          fi
          
          echo "✅ APK found at: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          ls -lh "$APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: attendance-app-debug
          path: ${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error