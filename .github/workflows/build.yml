- name: Generate Build System
  run: |
    cat > settings.gradle << 'EOF'
    pluginManagement {
        repositories {
            google()
            mavenCentral()
            gradlePluginPortal()
        }
    }
    dependencyResolutionManagement {
        repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
        repositories {
            google()
            mavenCentral()
        }
    }
    rootProject.name = "DigitalAttendance"
    EOF

    cat > gradle.properties << 'EOF'
    android.useAndroidX=true
    org.gradle.jvmargs=-Xmx2048m
    android.nonTransitiveRClass=true
    EOF

    mkdir -p res/values
    echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Attendance</string></resources>' > res/values/strings.xml

    cat > build.gradle << 'EOF'
    plugins { id 'com.android.application' version '8.2.0' }
    android {
        namespace 'com.attendance.digital'
        compileSdk 34
        defaultConfig {
            applicationId "com.attendance.digital"
            minSdk 24 targetSdk 34 versionCode 1 versionName "1.0"
        }
        compileOptions { sourceCompatibility JavaVersion.VERSION_17 targetCompatibility JavaVersion.VERSION_17 }
        sourceSets {
            main {
                manifest.srcFile 'AndroidManifest.xml'
                java.srcDirs = ['.']
                assets.srcDirs = ['.']
                res.srcDirs = ['res']
            }
        }
    }
    repositories { google(); mavenCentral() }
    EOF