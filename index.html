<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Attendance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --bg:#f1f5f9; --card:#ffffff; --primary:#3b82f6; --primary-hover:#2563eb; --success:#10b981; --warn:#f59e0b; --danger:#ef4444; --text:#0f172a; --muted:#64748b; --border:#e2e8f0; }
        * { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,-apple-system,sans-serif; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--text); padding-bottom:80px; }
        header { background:linear-gradient(135deg, var(--primary), #1d4ed8); color:#fff; padding:18px 16px; text-align:center; position:sticky; top:0; z-index:50; box-shadow:0 4px 12px rgba(59,130,246,0.3); }
        header h1 { font-size:18px; font-weight:700; letter-spacing:0.5px; }
        nav { display:flex; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:56px; z-index:40; overflow-x:auto; -webkit-overflow-scrolling:touch; }
        nav button { flex:1; min-width:70px; padding:14px 6px; border:none; background:transparent; color:var(--muted); font-weight:600; cursor:pointer; transition:0.2s; display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; }
        nav button i { font-size:16px; }
        nav button.active { color:var(--primary); border-bottom:3px solid var(--primary); background:rgba(59,130,246,0.05); }
        main { padding:16px; max-width:600px; margin:0 auto; }
        section { display:none; animation:fadeIn 0.3s ease; }
        section.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .card { background:var(--card); border-radius:16px; padding:18px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); border:1px solid var(--border); }
        h2 { margin-bottom:14px; font-size:17px; font-weight:700; display:flex; align-items:center; gap:8px; }
        .form-group { margin-bottom:12px; }
        input, select { width:100%; padding:13px; border:1.5px solid var(--border); border-radius:12px; font-size:15px; background:#fafafa; transition:0.2s; outline:none; }
        input:focus, select:focus { border-color:var(--primary); background:#fff; box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        button.btn { width:100%; padding:13px; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition:0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        button.btn.primary { background:var(--primary); color:#fff; }
        button.btn.primary:hover { background:var(--primary-hover); transform:translateY(-1px); }
        button.btn:active { transform:scale(0.98); }
        button.btn:disabled { opacity:0.6; cursor:wait; transform:none; }
        .item-row { display:flex; align-items:center; justify-content:space-between; padding:14px; background:#f8fafc; border-radius:12px; margin-bottom:10px; border:1px solid var(--border); transition:0.2s; }
        .item-row:hover { background:#f1f5f9; border-color:#cbd5e1; }
        .item-info h3 { font-size:15px; margin-bottom:2px; }
        .item-info small { color:var(--muted); font-size:13px; }
        .btn-icon { width:36px; height:36px; border:none; background:#fee2e2; color:var(--danger); border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
        .btn-icon:hover { background:var(--danger); color:#fff; }
        .status-group { display:flex; gap:6px; }
        .status-btn { width:32px; height:32px; border:1.5px solid var(--border); background:#fff; border-radius:8px; cursor:pointer; font-weight:700; color:var(--muted); transition:0.2s; display:flex; align-items:center; justify-content:center; }
        .status-btn.present { background:var(--success); color:#fff; border-color:var(--success); }
        .status-btn.absent { background:var(--danger); color:#fff; border-color:var(--danger); }
        .status-btn.late { background:var(--warn); color:#fff; border-color:var(--warn); }
        table { width:100%; border-collapse:separate; border-spacing:0; margin-top:8px; font-size:14px; }
        th { background:#f1f5f9; font-weight:600; color:var(--muted); padding:12px 8px; text-align:left; }
        th:first-child { border-radius:8px 0 0 0; } th:last-child { border-radius:0 8px 0 0; }
        td { padding:12px 8px; border-bottom:1px solid var(--border); background:#fff; }
        tr:last-child td:first-child { border-radius:0 0 0 8px; } tr:last-child td:last-child { border-radius:0 0 8px 0; }
        .empty { text-align:center; padding:24px; color:var(--muted); font-size:14px; }
        .export-group { display:flex; gap:8px; margin-top:12px; }
        .export-group button { flex:1; padding:12px; border:1.5px solid var(--border); background:#fff; color:var(--text); border-radius:12px; font-weight:600; cursor:pointer; transition:0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
        .export-group button:hover { background:#f8fafc; border-color:#cbd5e1; }
        .tag { display:inline-flex; align-items:center; padding:4px 8px; background:var(--primary); color:#fff; border-radius:6px; font-size:11px; font-weight:600; margin-left:8px; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:#0f172a; color:#fff; padding:12px 20px; border-radius:50px; font-size:14px; opacity:0; transition:0.3s; z-index:100; display:flex; align-items:center; gap:8px; pointer-events:none; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <header><h1><i class="fa-solid fa-clipboard-check"></i> Digital Attendance</h1></header>
    <nav>
        <button class="active" data-tab="sessions"><i class="fa-solid fa-calendar-days"></i> Sessions</button>
        <button data-tab="courses"><i class="fa-solid fa-book-open"></i> Courses</button>
        <button data-tab="students"><i class="fa-solid fa-user-graduate"></i> Students</button>
        <button data-tab="attendance"><i class="fa-solid fa-list-check"></i> Attendance</button>
        <button data-tab="reports"><i class="fa-solid fa-chart-pie"></i> Report</button>
    </nav>
    <main>
        <section id="sessions" class="active">
            <div class="card">
                <h2><i class="fa-solid fa-plus-circle" style="color:var(--primary)"></i> Create Session</h2>
                <div class="form-group"><input type="text" id="sessionName" placeholder="e.g., 2022-23"></div>
                <button class="btn primary" id="addSessionBtn" onclick="handleAdd('sessions')"><i class="fa-solid fa-save"></i> Create Session</button>
            </div>
            <div id="sessionList"></div>
        </section>

        <section id="courses">
            <div class="card">
                <h2><i class="fa-solid fa-plus-circle" style="color:var(--primary)"></i> Add Course & Teacher</h2>
                <div class="form-group"><select id="courseSessionSelect"><option value="">Select Session</option></select></div>
                <div class="form-group"><input type="text" id="courseName" placeholder="Course name (e.g., Computer)"></div>
                <div class="form-group"><input type="text" id="teacherName" placeholder="Teacher name (e.g., Mr. Smith)"></div>
                <button class="btn primary" id="addCourseBtn" onclick="handleAdd('courses')"><i class="fa-solid fa-save"></i> Add Course</button>
            </div>
            <div id="courseList"></div>
        </section>

        <section id="students">
            <div class="card">
                <h2><i class="fa-solid fa-user-plus" style="color:var(--primary)"></i> Register Student</h2>
                <div class="form-group"><select id="studentSessionSelect"><option value="">Select Session</option></select></div>
                <div class="form-group"><select id="studentCourseSelect"><option value="">Select Course</option></select></div>
                <div class="form-group"><input type="text" id="studentName" placeholder="Student Full Name"></div>
                <div class="form-group"><input type="text" id="studentRoll" placeholder="Roll Number"></div>
                <button class="btn primary" id="addStudentBtn" onclick="handleAdd('students')"><i class="fa-solid fa-save"></i> Register Student</button>
            </div>
            <div id="studentList"></div>
        </section>

        <section id="attendance">
            <div class="card">
                <h2><i class="fa-solid fa-pen-to-square" style="color:var(--primary)"></i> Mark Attendance</h2>
                <div class="form-group"><select id="attSessionSelect"><option value="">Select Session</option></select></div>
                <div class="form-group"><select id="attCourseSelect"><option value="">Select Course</option></select></div>
                <div class="form-group"><input type="date" id="attDate"></div>
                <button class="btn primary" onclick="loadAttendanceSheet()"><i class="fa-solid fa-download"></i> Load Sheet</button>
            </div>
            <div id="attSheet" class="card" style="display:none;">
                <div id="attList"></div>
                <div style="display:flex; gap:8px; margin-top:16px;">
                    <button class="btn primary" id="saveAttBtn" onclick="saveAttendance()"><i class="fa-solid fa-cloud-arrow-up"></i> Sync to Cloud</button>
                    <button class="btn" style="background:#f1f5f9; color:var(--text)" onclick="markAll('Present')"><i class="fa-solid fa-check-double"></i> All Present</button>
                </div>
            </div>
        </section>

        <section id="reports">
            <div class="card">
                <h2><i class="fa-solid fa-file-export" style="color:var(--primary)"></i> Moderated Session Report</h2>
                <div class="form-group"><select id="reportSessionSelect"><option value="">Select Session</option></select></div>
                <button class="btn primary" onclick="loadModeratedReport()"><i class="fa-solid fa-magnifying-glass-chart"></i> Generate Report</button>
                <div class="export-group">
                    <button onclick="exportReportCSV()"><i class="fa-solid fa-file-csv"></i> CSV</button>
                    <button onclick="exportReportPDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                </div>
            </div>
            <div id="reportTable" class="card" style="display:none;">
                <table>
                    <thead><tr><th>Date</th><th>Course</th><th>Teacher</th><th>Name</th><th>Roll</th><th>Status</th></tr></thead>
                    <tbody id="reportBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div class="toast" id="toast"><i class="fa-solid fa-circle-info"></i> <span id="toastMsg"></span></div>

    <script>
      const API_URL = 'https://little-resonance-40fb.monirol4664.workers.dev'; // 🔑 REPLACE THIS
      const state = { sessions: [], courses: [], students: [] };
      
      const api = {
        get: async (path, params = {}) => {
          const q = new URLSearchParams(params).toString();
          const res = await fetch(`${API_URL}/api/${path}${q?'?'+q:''}`, { headers:{'Accept':'application/json'} });
          if(!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);
          return await res.json();
        },
        post: async (path, body) => {
          const res = await fetch(`${API_URL}/api/${path}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
          if(!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);
          return await res.json();
        },
        delete: async (path, params) => {
          const q = new URLSearchParams(params).toString();
          const res = await fetch(`${API_URL}/api/${path}?${q}`, { method:'DELETE' });
          if(!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);
          return await res.json();
        }
      };

      const DB = { id: () => Date.now().toString(36) + Math.random().toString(36).substr(2) };
      const toast = (msg, type='info') => {
        const t = document.getElementById('toast');
        t.innerHTML = `<i class="fa-solid fa-${type==='success'?'check-circle':type==='error'?'circle-exclamation':'circle-info'}"></i> ${msg}`;
        t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500);
      };

      const setBtn = (id, load, txt) => { const b=document.getElementById(id); if(b){b.disabled=load; b.innerHTML=load?'<i class="fa-solid fa-circle-notch fa-spin"></i> Syncing...':txt; if(!b.dataset.orig) b.dataset.orig=txt; }};
      const renderEmpty = (el, txt) => el.innerHTML = `<div class="empty"><i class="fa-solid fa-inbox" style="font-size:24px;margin-bottom:8px;display:block"></i>${txt}</div>`;

      // TAB NAV
      document.querySelectorAll('nav button').forEach(btn => {
        btn.onclick = async () => {
          document.querySelectorAll('nav button, section').forEach(e=>e.classList.remove('active'));
          btn.classList.add('active'); document.getElementById(btn.dataset.tab).classList.add('active');
          if(btn.dataset.tab==='sessions') await loadSessions();
          else if(btn.dataset.tab==='courses') await refreshDropdowns();
        };
      });

      // ADD HANDLER
      async function handleAdd(type) {
        const btn = type==='sessions'?'addSessionBtn':type==='courses'?'addCourseBtn':'addStudentBtn';
        setBtn(btn, true, document.getElementById(btn).dataset.orig);
        try {
          if(type==='sessions') {
            const n = document.getElementById('sessionName').value.trim();
            if(!n || state.sessions.find(s=>s.name.toLowerCase()===n.toLowerCase())) throw new Error('Invalid or exists');
            await api.post('sessions', { id:DB.id(), name:n });
            document.getElementById('sessionName').value='';
            await loadSessions(); toast('Session created', 'success');
          } else if(type==='courses') {
            const sid = document.getElementById('courseSessionSelect').value;
            const n = document.getElementById('courseName').value.trim();
            const t = document.getElementById('teacherName').value.trim();
            if(!sid||!n||!t) throw new Error('Fill all fields');
            await api.post('courses', { id:DB.id(), session_id:sid, name:n, teacher:t });
            document.getElementById('courseName').value=''; document.getElementById('teacherName').value='';
            await loadCourses(sid); toast('Course added', 'success');
          } else {
            const cid = document.getElementById('studentCourseSelect').value;
            const n = document.getElementById('studentName').value.trim();
            const r = document.getElementById('studentRoll').value.trim();
            if(!cid||!n||!r) throw new Error('Fill all fields');
            await api.post('students', { id:DB.id(), course_id:cid, name:n, roll:r });
            document.getElementById('studentName').value=''; document.getElementById('studentRoll').value='';
            await loadStudents(cid); toast('Student registered', 'success');
          }
        } catch(e) { toast(e.message, 'error'); }
        finally { setBtn(btn, false, document.getElementById(btn).dataset.orig); }
      }

      // LOAD & RENDER
      async function loadSessions() {
        state.sessions = (await api.get('sessions')).results || [];
        const l = document.getElementById('sessionList');
        if(!state.sessions.length) return renderEmpty(l, 'No sessions yet');
        l.innerHTML = state.sessions.map(s => `
          <div class="item-row"><div class="item-info"><h3>${s.name}</h3><small><i class="fa-solid fa-book"></i> ${state.courses.filter(c=>c.session_id===s.id).length} courses</small></div><button class="btn-icon" onclick="deleteItem('sessions','${s.id}')"><i class="fa-solid fa-trash"></i></button></div>
        `).join('');
      }
      async function loadCourses(sid) {
        state.courses = sid ? (await api.get('courses', {session_id:sid})).results||[] : [];
        const l = document.getElementById('courseList');
        if(!sid) return renderEmpty(l, 'Select a session');
        if(!state.courses.length) return renderEmpty(l, 'No courses in this session');
        l.innerHTML = state.courses.map(c => `
          <div class="item-row"><div class="item-info"><h3>${c.name}</h3><small><i class="fa-solid fa-chalkboard-user"></i> ${c.teacher}</small></div><button class="btn-icon" onclick="deleteItem('courses','${c.id}')"><i class="fa-solid fa-trash"></i></button></div>
        `).join('');
      }
      async function loadStudents(cid) {
        state.students = cid ? (await api.get('students', {course_id:cid})).results||[] : [];
        const l = document.getElementById('studentList');
        if(!cid) return renderEmpty(l, 'Select a course');
        if(!state.students.length) return renderEmpty(l, 'No students registered');
        l.innerHTML = state.students.map(s => `
          <div class="item-row"><div class="item-info"><h3><span class="tag">${s.roll}</span> ${s.name}</h3></div><button class="btn-icon" onclick="deleteItem('students','${s.id}')"><i class="fa-solid fa-trash"></i></button></div>
        `).join('');
      }

      // DELETE
      async function deleteItem(path, id) {
        if(!confirm('Delete permanently? This removes linked data.')) return;
        try {
          await api.delete(path, {id});
          await refreshDropdowns();
          if(path==='sessions') await loadSessions();
          else if(path==='courses') await loadCourses(document.getElementById('courseSessionSelect').value);
          else if(path==='students') await loadStudents(document.getElementById('studentCourseSelect').value);
          toast('Deleted successfully', 'success');
        } catch(e) { toast(e.message, 'error'); }
      }

      // ATTENDANCE
      async function loadAttendanceSheet() {
        const cid = document.getElementById('attCourseSelect').value;
        const date = document.getElementById('attDate').value;
        if(!cid||!date) return toast('Select course & date', 'error');
        try {
          const [existing, studs] = await Promise.all([
            api.get('attendance', {course_id:cid, date}),
            api.get('students', {course_id:cid})
          ]);
          const map = Object.fromEntries((existing.results||[]).map(r=>[r.student_id, r.status]));
          const list = document.getElementById('attList');
          list.dataset.cid = cid; list.dataset.date = date;
          document.getElementById('attSheet').style.display = 'block';
          list.innerHTML = (studs.results||[]).map(s => `
            <div class="item-row" style="margin-bottom:8px"><div style="flex:1"><strong>${s.roll}</strong><br>${s.name}</div><div class="status-group"><button class="status-btn ${map[s.id]==='Present'?'present':''}" onclick="setStatus('${s.id}','Present',this)">P</button><button class="status-btn ${map[s.id]==='Absent'?'absent':''}" onclick="setStatus('${s.id}','Absent',this)">A</button><button class="status-btn ${map[s.id]==='Late'?'late':''}" onclick="setStatus('${s.id}','Late',this)">L</button></div></div>
          `).join('');
        } catch(e) { toast(e.message, 'error'); }
      }
      function setStatus(sid, status, btn) {
        btn.parentElement.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('present','absent','late'));
        btn.classList.add(status.toLowerCase()); btn.dataset.sid=sid;
      }
      function markAll(status) {
        document.querySelectorAll('#attList .status-btn').forEach(b => { if(b.textContent===status[0]) b.click(); });
      }
      async function saveAttendance() {
        const cid = document.getElementById('attList').dataset.cid;
        const date = document.getElementById('attList').dataset.date;
        if(!cid||!date) return toast('Load a sheet first', 'error');
        setBtn('saveAttBtn', true, document.getElementById('saveAttBtn').dataset.orig);
        try {
          const recs = [];
          document.querySelectorAll('#attList .status-btn').forEach(b => {
            if(b.dataset.sid && b.classList.length>1) {
              const st = b.classList.contains('present')?'Present':b.classList.contains('absent')?'Absent':'Late';
              recs.push({course_id:cid, date, student_id:b.dataset.sid, status:st});
            }
          });
          if(!recs.length) throw new Error('Mark at least one student');
          await api.post('attendance', recs);
          toast(`${recs.length} records synced`, 'success');
        } catch(e) { toast(e.message, 'error'); }
        finally { setBtn('saveAttBtn', false, document.getElementById('saveAttBtn').dataset.orig); }
      }

      // REPORTS
      async function loadModeratedReport() {
        const sid = document.getElementById('reportSessionSelect').value;
        const tb = document.getElementById('reportTable'), body = document.getElementById('reportBody');
        if(!sid) return toast('Select a session', 'error');
        tb.style.display='block'; body.innerHTML='<tr><td colspan="6" class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</td></tr>';
        try {
          const data = (await api.get('report', {session_id:sid})).results||[];
          if(!data.length) return body.innerHTML='<tr><td colspan="6" class="empty">No records found</td></tr>';
          body.innerHTML = data.map(d => `<tr><td>${d.date}</td><td>${d.course}</td><td>${d.teacher}</td><td>${d.name}</td><td>${d.roll}</td><td><span class="tag" style="background:${d.status==='Present'? 'var(--success)':d.status==='Absent'?'var(--danger)':'var(--warn)'}">${d.status}</span></td></tr>`).join('');
        } catch(e) { toast(e.message,'error'); body.innerHTML=''; }
      }
      async function exportReportCSV() {
        const sid = document.getElementById('reportSessionSelect').value;
        if(!sid) return toast('Select session', 'error');
        const data = (await api.get('report', {session_id:sid})).results||[];
        if(!data.length) return toast('No data', 'error');
        const sName = state.sessions.find(s=>s.id===sid)?.name||'Report';
        let csv = 'Date,Course,Teacher,Student,Roll,Status\n';
        data.forEach(d => csv+=`"${d.date}","${d.course}","${d.teacher}","${d.name}","${d.roll}","${d.status}"\n`);
        saveToAndroid(`moderated_${sName}.csv`, csv);
      }
      async function exportReportPDF() {
        const sid = document.getElementById('reportSessionSelect').value;
        if(!sid || typeof window.jspdf==='undefined') return toast('Select session / check internet', 'error');
        const data = (await api.get('report', {session_id:sid})).results||[];
        if(!data.length) return toast('No data', 'error');
        const {jsPDF} = window.jspdf; const doc = new jsPDF();
        const sName = state.sessions.find(s=>s.id===sid)?.name||'Report';
        doc.setFontSize(18); doc.text(`Moderated Report: ${sName}`, 14, 20);
        doc.autoTable({ head:[['Date','Course','Teacher','Student','Roll','Status']], body:data.map(d=>[d.date,d.course,d.teacher,d.name,d.roll,d.status]), startY:30, theme:'grid', styles:{fontSize:8}, headStyles:{fillColor:[59,130,246]} });
        saveToAndroid(`moderated_${sName}.pdf`, doc.output('blob'));
      }

      // BRIDGE & UTILS
      function saveToAndroid(fileName, blob) {
        if(typeof AndroidFileSaver==='undefined') return toast('Storage not available', 'error');
        const r = new FileReader();
        r.onloadend = () => { AndroidFileSaver.saveFile(fileName, r.result.split(',')[1], blob.type||'app/octet-stream'); toast('Saved to Downloads', 'success'); };
        r.readAsDataURL(blob instanceof Blob ? blob : new Blob([blob],{type:'text/csv'}));
      }
      async function refreshDropdowns() {
        const opts = state.sessions.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
        ['courseSessionSelect','studentSessionSelect','attSessionSelect','reportSessionSelect'].forEach(id=>{
          document.getElementById(id).innerHTML = '<option value="">Select Session</option>'+opts;
        });
        if(!document.getElementById('attDate').value) document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
      }
      document.getElementById('courseSessionSelect').onchange = e => loadCourses(e.target.value);
      document.getElementById('studentSessionSelect').onchange = async e => {
        const c = (await api.get('courses', {session_id:e.target.value})).results||[];
        document.getElementById('studentCourseSelect').innerHTML = '<option value="">Select Course</option>'+c.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
        document.getElementById('studentList').innerHTML = '';
      };
      document.getElementById('attSessionSelect').onchange = async e => {
        const c = (await api.get('courses', {session_id:e.target.value})).results||[];
        document.getElementById('attCourseSelect').innerHTML = '<option value="">Select Course</option>'+c.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
        document.getElementById('attSheet').style.display='none';
      };

      // INIT
      loadSessions();
    </script>
</body>
</html>
